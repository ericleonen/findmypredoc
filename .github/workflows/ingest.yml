name: Ingest predoc postings

# Refreshes the Neon predoc/source tables by running service/run_pipeline.py -- see
# service/README.md and the repo-root CLAUDE.md for what the pipeline does.

on:
  schedule:
    # 12:17 UTC daily (off the hour to avoid the top-of-hour GitHub Actions rush).
    - cron: "17 12 * * *"
  workflow_dispatch:
    inputs:
      overwrite_where:
        description: >
          Optional: raw SQL boolean expression (predoc.*/source.* columns) selecting
          existing predoc rows to reprocess instead of skip, passed as run_pipeline.py's
          --overwrite-where. Leave blank for a normal run.
        required: false
        default: ""
      from_db:
        description: "Reprocess matching rows from the DB instead of re-scraping sources (requires overwrite_where above)"
        required: false
        type: boolean
        default: false

concurrency:
  group: ingest-predoc-postings
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            findmypredoc/pyproject.toml
            service/requirements.txt

      - name: Install findmypredoc + service dependencies
        run: |
          pip install -e ./findmypredoc
          pip install -r service/requirements.txt

      - name: Install Playwright Chromium (for JS-rendered postings)
        run: playwright install --with-deps chromium

      - name: Trust GoDaddy G2 intermediate CA
        # predoc.org's server (GoDaddy-hosted) sends only its leaf cert, omitting the
        # intermediate -- browsers/Windows/macOS silently fetch it via the cert's AIA
        # extension, but Linux/OpenSSL (what pipeline/__init__.py's truststore.inject_into_ssl()
        # falls back to on Linux, since there's no unified OS trust API there) doesn't chase
        # AIA, so verification fails with "unable to get local issuer certificate". Installing
        # the intermediate into the runner's system trust store fixes it at the source.
        run: |
          curl -fsSL http://certificates.godaddy.com/repository/gdig2.crt -o /tmp/gdig2.der
          openssl x509 -inform DER -in /tmp/gdig2.der -out /tmp/gdig2.pem
          sudo cp /tmp/gdig2.pem /usr/local/share/ca-certificates/godaddy-g2.crt
          sudo update-ca-certificates

      - name: Run ingestion pipeline
        id: ingest
        working-directory: service
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          args=()
          if [ -n "${{ inputs.overwrite_where }}" ]; then
            args+=(--overwrite-where "${{ inputs.overwrite_where }}")
          fi
          if [ "${{ inputs.from_db }}" = "true" ]; then
            args+=(--from-db)
          fi
          python run_pipeline.py "${args[@]}"

      - name: Email summary if new links were found
        if: steps.ingest.outputs.new_links != '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: findmypredoc <${{ secrets.GMAIL_USERNAME }}>
          to: ericleonen@gmail.com
          subject: "findmypredoc: ${{ steps.ingest.outputs.new_links }} new posting(s) ingested"
          body: |
            New links found: ${{ steps.ingest.outputs.new_links }}
            Extracted successfully: ${{ steps.ingest.outputs.extracted }}
            Failed: ${{ steps.ingest.outputs.failed }}
            Skipped (already seen): ${{ steps.ingest.outputs.skipped }}
            Success rate: ${{ steps.ingest.outputs.success_rate }}%
            Estimated extraction cost: $${{ steps.ingest.outputs.cost }}

            New postings:
            ${{ steps.ingest.outputs.postings }}

      - name: Commit updated README if new postings were found
        if: steps.ingest.outputs.new_links != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && exit 0
          git commit -m "Update README with latest postings found"
          git push
